services:
  back:
    build:
      context: ./back
    container_name: app-back
    ports:
      - "8000:8000"
    volumes:
      - ./back/src:/app/src
      - ./back/data:/app/data
      - ./output:/app/output
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uv", "run", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  front:
    build:
      context: ./front
      target: development
    container_name: app-front
    ports:
      - "80:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - back
